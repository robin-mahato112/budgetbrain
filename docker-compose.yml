services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: budgetbrain
      POSTGRES_USER: budgetbrain
      POSTGRES_PASSWORD: budgetbrain
    ports:
      - "5432:5432"
    volumes:
      - budgetbrain_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budgetbrain -d budgetbrain"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  budgetbrain_postgres:
