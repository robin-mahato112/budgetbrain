services:
  - type: web
    name: budgetbrain-api
    runtime: node
    rootDir: server
    buildCommand: npm ci && npm run db:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: budgetbrain-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: AI_DAILY_LIMIT
        value: "25"
      - key: AI_MONTHLY_LIMIT
        value: "500"

databases:
  - name: budgetbrain-postgres
    databaseName: budgetbrain
    user: budgetbrain
